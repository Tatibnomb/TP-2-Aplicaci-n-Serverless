name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install
        working-directory: studyflow

      - name: Ejecutar lint
        run: npm run lint
        working-directory: studyflow

      - name: Ejecutar tests unitarios
        run: npm run test
        working-directory: studyflow

      - name: Ejecutar build
        run: npm run build
        working-directory: studyflow